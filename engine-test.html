<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Cube Engine Test</title>
</head>
<body>
  <h2>Cube Engine Test</h2>
  <button id="run">Spustit test</button>
  <pre id="out"></pre>

  <script type="module">
    const out = document.getElementById("out");
    const btn = document.getElementById("run");

    btn.onclick = async () => {
      out.textContent = "Testuji ruční vytvoření KPattern...";

      try {
        const puzzles = await import("https://cdn.cubing.net/js/cubing/puzzles");
        const kpuzzleMod = await import("https://cdn.cubing.net/js/cubing/kpuzzle");

        const kpuzzle = await puzzles.cube3x3x3.kpuzzle();
        const solved = kpuzzle.defaultPattern();

        const solvedJson = solved.toJSON();

        const pattern = new kpuzzleMod.KPattern(
          kpuzzle,
          solvedJson.patternData
        );

        out.textContent =
          "KPattern create OK\n" +
          "Solved? " +
          pattern.experimentalIsSolved({
            ignorePuzzleOrientation: true,
            ignoreCenterOrientation: true
          });

      } catch (e) {
        out.textContent = "CHYBA:\n" + e.message;
      }
    };
  </script>
</body>
</html>
