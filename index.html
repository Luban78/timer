<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MG3i Signal Decoder v3.3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
body{
margin:0;
background:#0c0f12;
color:#e2e8f0;
font-family:'Courier New',monospace;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
min-height:100vh;
padding:20px;
box-sizing:border-box;
}
#version-tag {
font-family: sans-serif;
font-size: 14px;
font-weight: bold;
color: #00e5ff;
background: rgba(0,229,255,0.1);
padding: 4px 12px;
border-radius: 20px;
border: 1px solid #00e5ff;
margin-bottom: 15px;
}
button{
padding:15px 30px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:8px;
background:#00e5ff;
color:black;
margin-bottom:20px;
cursor:pointer;
font-family:sans-serif;
box-shadow: 0 4px 15px rgba(0,229,255,0.3);
}
#status{
color:#a0aec0;
font-size:14px;
margin-bottom:20px;
font-family:sans-serif;
}
.console{
background:#1a202c;
border:2px solid #4a5568;
border-radius:10px;
padding:20px;
width:100%;
max-width:550px;
box-sizing:border-box;
}
.log-item{
padding:10px;
border-bottom:1px solid #2d3748;
font-size:14px;
line-height: 1.5;
}
.highlight{ color:#ffeb3b; font-weight:bold; }
.success{ color:#00e676; font-weight:bold; }
</style>
</head>
<body>

<div id="version-tag">VERZE APLIKACE: v3.3 (LIVE DECODER)</div>

<button id="btn">SPUSTIT DEKODÉR SIGNÁLŮ</button>
<div id="status">Odpojeno</div>

<div class="console" id="console-box">
    <div style="text-align:center;color:#718096;">Připoj kostku a proveď libovolný tah.</div>
</div>

<script>
const btn=document.getElementById("btn");
const status=document.getElementById("status");
const consoleBox=document.getElementById("console-box");

const AES_KEY_HEX = "2d565c3412ab00000000000000000000"; 
const key = CryptoJS.enc.Hex.parse(AES_KEY_HEX);

let lastMoveCount = null;
const faces = ["U (Bílá)", "R (Červená)", "F (Zelená)", "D (Žlutá)", "L (Oranžová)", "B (Modrá)"];

btn.onclick=async()=>{
    try{
        status.innerText="Hledám Bluetooth kostku...";
        const device=await navigator.bluetooth.requestDevice({
            filters:[{namePrefix:"MG"}, {namePrefix:"GAN"}],
            optionalServices:["6e400001-b5a3-f393-e0a9-e50e24dc4179"]
        });

        const server=await device.gatt.connect();
        const service=await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dc4179");
        const characteristic=await service.getCharacteristic("28be4cb6-cd67-11e9-a32f-2a2ae2dbcce4");

        await characteristic.startNotifications();

        btn.style.display="none";
        status.innerText="Dekóduji signály v reálném čase z: " + device.name;
        consoleBox.innerHTML = "<div style='color:#00e676; text-align:center;'>Kostka připravena. Otoč libovolnou stěnou!</div>";

        characteristic.addEventListener("characteristicvaluechanged",event=>{
            const value=event.target.value;
            if(value.byteLength < 16) return;

            let cleanBytes = new Uint8Array(16);
            for(let i=0; i<16; i++) cleanBytes[i] = value.getUint8(i);

            let wordArray = CryptoJS.lib.WordArray.create(cleanBytes);
            let decrypted = CryptoJS.AES.decrypt({ ciphertext: wordArray }, key, { mode: CryptoJS.mode.ECB, padding: CryptoJS.pad.NoPadding });

            let decBytes = [];
            for (let i = 0; i < 16; i++) {
                decBytes.push((decrypted.words[i >>> 2] >>> (24 - (i % 4) * 8)) & 0xff);
            }

            let rawMoveInfo = decBytes[4];
            let moveCount = decBytes[5];

            // Rozbití Bajtu [04] na index stěny a směr podle specifikace GAN protokolu
            let faceIndex = rawMoveInfo >> 4; 
            let directionSign = rawMoveInfo & 0x0F; 

            let faceName = faces[faceIndex] || "Neznámá stěna (" + faceIndex + ")";
            let directionName = "Neznámý směr";
            if(directionSign === 1) directionName = "ve směru hodinových ručiček (90°)";
            if(directionSign === 2) directionName = "proti směru hodinových ručiček (90°)";
            if(directionSign === 3) directionName = "dvojitý tah (180°)";

            // Detekce, zda jde o nový potvrzený tah nebo jen průběžný signál
            let isNewMove = false;
            if (lastMoveCount !== null && moveCount !== lastMoveCount) {
                isNewMove = true;
            }

            let html = `
                <div class="log-item">
                    <b>Průběžný signál stěny:</b> <span class="highlight">${faceName}</span><br>
                    <b>Surová data tahu (Bajt 04):</b> HEX: 0x${rawMoveInfo.toString(16).toUpperCase()} (DEC: ${rawMoveInfo})<br>
                    <b>Vnitřní čítač kostky (Bajt 05):</b> ${moveCount}<br>
                    <b>Stav tahu v aplikaci:</b> ${isNewMove ? '<span class="success">POTVRZENÝ NOVÝ TAH!</span>' : '<span>Fyzický pohyb (ignorovano pro TPS)</span>'}
                </div>
            `;

            consoleBox.innerHTML = html + consoleBox.innerHTML;
            lastMoveCount = moveCount;
        });

    }catch(e){
        status.innerText="Chyba: " + e.message;
    }
};
</script>
</body>
</html>
