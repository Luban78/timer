<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MG3i Signal Analyzer v5.1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
body { margin:0; background:#0a0d14; color:#cfd8dc; font-family:'Courier New',monospace; padding:15px; box-sizing:border-box; }
#header { font-family:sans-serif; background:#1a2332; padding:12px; border-radius:6px; border:1px solid #00e5ff; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; }
button { background:#00e5ff; color:#000; border:none; padding:10px 20px; font-weight:bold; border-radius:4px; cursor:pointer; }
.grid { display:grid; grid-template-columns:1fr; gap:15px; }
@media(min-width:768px) { .grid { grid-template-columns: 1fr 1fr; } }
.card { background:#101622; border:1px solid #232f44; border-radius:6px; padding:15px; }
.card-title { font-family:sans-serif; color:#00e5ff; font-weight:bold; margin-top:0; margin-bottom:10px; font-size:14px; text-transform:uppercase; }
.log-entry { background:#070a10; padding:8px; border-radius:4px; margin-bottom:8px; border-left:3px solid #ff9100; font-size:12px; }
.changed-byte { color:#ff9100; font-weight:bold; }
.table-dump { width:100%; border-collapse:collapse; font-size:12px; }
.table-dump th, .table-dump td { text-align:left; padding:4px; border-bottom:1px solid #1a2332; }
.table-dump tr.delta { background:rgba(0,229,255,0.05); }
</style>
</head>
<body>

<div id="header">
    <div>
        <strong style="color:#ff9100;">LOGOVACÍ JÁDRO v5.1</strong><br>
        <span id="status" style="font-size:12px; color:#90a4ae;">Odpojeno - Připravte kostku</span>
    </div>
    <button id="conn-btn">PŘIPOJIT</button>
</div>

<div class="grid">
    <div class="card">
        <div class="card-title">⚠️ Detekované změny v reálném čase</div>
        <div id="change-log">
            <div style="color:#546e7a; text-align:center; padding:20px;">Proveďte tah na kostce pro analýzu...</div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📊 Kompletní mapa registrů (00-19)</div>
        <table class="table-dump">
            <thead>
                <tr>
                    <th>Bajt</th>
                    <th>HEX</th>
                    <th>DEC</th>
                    <th>Binární mapa (Bity 7-0)</th>
                </tr>
            </thead>
            <tbody id="registry-body">
                <tr><td colspan="4" style="color:#546e7a; text-align:center; padding:20px;">Čeká se na data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const AES_KEY_HEX = "2d565c3412ab00000000000000000000"; 
const key = CryptoJS.enc.Hex.parse(AES_KEY_HEX);
let lastBytes = new Array(20).fill(0);
let logCounter = 0;

document.getElementById("conn-btn").onclick = async () => {
    try {
        document.getElementById("status").innerText = "Skenuji BLE okolí...";
        const device = await navigator.bluetooth.requestDevice({
            filters: [{namePrefix:"MG"}, {namePrefix:"GAN"}],
            optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dc4179"]
        });

        const server = await device.gatt.
