<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>MG3i Real TPS</title>

<style>

body{
margin:0;
background:#121212;
color:white;
font-family:Arial,sans-serif;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
min-height:100vh;
}

button{
padding:15px 30px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:50px;
background:#00e676;
}

#status{
margin:15px;
color:#aaa;
}

#notation{
width:90%;
max-width:500px;
padding:12px;
background:#1e1e1e;
border-radius:10px;
font-family:monospace;
font-size:22px;
color:#ffea00;
min-height:70px;
word-break:break-word;
}

#tps{
font-size:90px;
font-weight:bold;
color:#00e5ff;
margin-top:20px;
}

.stats{
margin-top:15px;
font-size:24px;
}

</style>
</head>

<body>

<button id="btn">
PŘIPOJIT KOSTKU
</button>

<div id="status">
Odpojeno
</div>

<div id="notation">
Notace:
</div>

<div id="tps">
0.0
</div>

<div class="stats">
Tahy:
<span id="moves">
0
</span>
</div>

<script type="module">

import {connectGanCube}
from "https://cdn.jsdelivr.net/npm/gan-web-bluetooth/+esm";

const btn=
document.getElementById("btn");

const status=
document.getElementById("status");

const notation=
document.getElementById("notation");

const tpsDiv=
document.getElementById("tps");

const movesDiv=
document.getElementById("moves");

let sequence=[];
let moveTimes=[];
let totalMoves=0;

btn.onclick=async()=>{

try{

status.innerText=
"Připojuji...";

const cube=
await connectGanCube();

status.innerText=
"Připojeno";

cube.events$
.subscribe(event=>{

if(event.type==="MOVE"){

const move=
event.move;

sequence.push(move);

if(sequence.length>25){

sequence.shift();

}

notation.innerText=
"Notace:\n"+
sequence.join(" ");

const now=
performance.now();

moveTimes.push(now);

moveTimes=
moveTimes.filter(
t=>now-t<1000
);

totalMoves++;

movesDiv.innerText=
totalMoves;

const tps=
moveTimes.length;

tpsDiv.innerText=
tps.toFixed(1);

}

});

}
catch(e){

status.innerText=
e.message;

}

};

</script>

</body>
</html>
