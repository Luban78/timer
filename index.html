<!DOCTYPE html>
<html lang="cs">
<head>
    
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes"> 
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MG Trainer">
<title>MG3i Trainer</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">
<button id="btn">PŘIPOJIT KOSTKU</button>

<div id="modeButtons">
<button class="modeBtn" id="ollBtn">OLL</button>
<button class="modeBtn" id="pllBtn">PLL</button>
</div>

<div id="status">Odpojeno</div>

<div id="selectedAlg">Algoritmus: nevybráno</div>
<div id="notation">Notace:</div>

<div id="state-msg">Připoj kostku...</div>
<div id="tps">0.0</div>

<div class="stats-grid">
<div class="stat-box"><div class="stat-label">Čas</div><div id="time-val" class="stat-val">0.00s</div></div>
<div class="stat-box"><div class="stat-label">Tahy HTM</div><div id="moves-val" class="stat-val">0</div></div>
<div class="stat-box"><div class="stat-label">Průměr TPS</div><div id="avg-val" class="stat-val" style="color:#00e676">0.0</div></div>
<div class="stat-box"><div class="stat-label">Špička TPS</div><div id="max-val" class="stat-val">0.0</div></div>
<div class="stat-box" style="grid-column:span 2"><div class="stat-label">Nejdelší pauza</div><div id="pause-val" class="stat-val" style="color:#ff1744">0.00s</div></div>
</div>

<canvas id="graph"></canvas>
</div>

<div id="history">
<div id="history-title">ČASY</div>
<div id="history-list">-</div>
</div>

<div id="modal">
<div id="modalContent">
<h2 id="modalTitle">PLL</h2>
<div class="algGrid" id="algList"></div>
<button class="closeBtn" id="closeModal">ZAVŘÍT</button>
</div>
</div>

<script type="module">
import { connectGanCube } from "https://esm.sh/gan-web-bluetooth";

const pllAlgs={
"Ua-perm":"R U' R U R U R U' R' U' R2",
"Ub-perm":"R2 U R U R' U' R' U' R' U R'",
"Z-perm":"M2 U M2 U M' U2 M2 U2 M' U2",
"H-perm":"M2 U M2 U2 M2 U M2",
"Aa-perm":"x R' U R' D2 R U' R' D2 R2 x'",
"Ab-perm":"x R2 D2 R U R' D2 R U' R x'",
"E-perm":"x' R U' R' D R U R' D' R U R' D R U' R' D'",
"T-perm":"R U R' U' R' F R2 U' R' U' R U R' F'",
"F-perm":"R' U' F' R U R' U' R' F R2 U' R' U' R U R' U R",
"Ja-perm":"x R2 F R F' R U2 r' U r U2",
"Jb-perm":"R U R' F' R U R' U' R' F R2 U' R'",
"Ra-perm":"R U' R' U' R U R D R' U' R D' R' U2 R'",
"Rb-perm":"R' U2 R U2 R' F R U R' U' R' F' R2",
"V-perm":"R' U R' U' y R' F' R2 U' R' U R' F R F",
"Y-perm":"F R U' R' U' R U R' F' R U R' U' R' F R F'",
"Na-perm":"R U R' U R U R' F' R U R' U' R' F R2 U' R'",
"Nb-perm":"R' U R U' R' F' U' F R U R' F R' F' R U'",
"Ga-perm":"R2 U R' U R' U' R U' R2 D U' R' U R D'",
"Gb-perm":"R' U' R U D' R2 U R' U R U' R U' R2 D",
"Gc-perm":"R2 U' R U' R U R' U R2 D' U R U' R' D",
"Gd-perm":"R U R' U' D R2 U' R U' R' U R' U R2 D'"
};

const btn=document.getElementById("btn");
const modeButtons=document.getElementById("modeButtons");
const pllBtn=document.getElementById("pllBtn");
const ollBtn=document.getElementById("ollBtn");
const modal=document.getElementById("modal");
const algList=document.getElementById("algList");
const closeModal=document.getElementById("closeModal");
const status=document.getElementById("status");
const selectedAlg=document.getElementById("selectedAlg");
const notation=document.getElementById("notation");
const stateMsg=document.getElementById("state-msg");
const tpsDiv=document.getElementById("tps");
const timeVal=document.getElementById("time-val");
const movesVal=document.getElementById("moves-val");
const avgVal=document.getElementById("avg-val");
const maxVal=document.getElementById("max-val");
const pauseVal=document.getElementById("pause-val");
const historyList=document.getElementById("history-list");
const canvas=document.getElementById("graph");
const ctx=canvas.getContext("2d");

let seq=[],moveTimes=[],tpsHistory=[],savedSolves=[];
let totalMoves=0,maxTPS=0,longestPause=0;
let isSolving=false,isConnected=false;
let startTime=0,lastMoveTime=0;
let uiTimer=null,stopTimer=null;
let pendingMove=null,pendingMoveTime=0,pendingTimer=null;
let audioCtx=null,lastBeep=0;

const DOUBLE_MOVE_WINDOW=280;
const TPS_WINDOW=2000;

function resize(){
canvas.width=window.innerWidth-92;
canvas.height=window.innerHeight*.23;
}
window.onresize=resize;
resize();

function initAudio(){
if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
if(audioCtx.state==="suspended") audioCtx.resume();
}

function beep(freq=240,dur=.12){
try{
initAudio();
const o=audioCtx.createOscillator();
const g=audioCtx.createGain();
o.frequency.value=freq;
g.gain.setValueAtTime(.06,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(.00001,audioCtx.currentTime+dur);
o.connect(g);g.connect(audioCtx.destination);
o.start();o.stop(audioCtx.currentTime+dur);
}catch(e){}
}

btn.onclick=async(e)=>{
e.stopPropagation();
try{
initAudio();
status.innerText="Připojuji...";
const cube=await connectGanCube();

cube.events$.subscribe(event=>{
if(event.type==="MOVE") handleRawMove(event.move);
if(event.type==="FACELETS") status.innerText="Připojeno + stav načten";
});

if(typeof cube.sendCubeCommand==="function"){
await cube.sendCubeCommand({type:"REQUEST_FACELETS"});
}

isConnected=true;
btn.style.display="none";
modeButtons.style.display="grid";
status.innerText="Připojeno, začni otočením kostky";
stateMsg.innerText="PŘIPRAVEN";
beep(523,.08);

}catch(e){status.innerText="Chyba: "+e.message;}
};

pllBtn.onclick=e=>{
e.stopPropagation();
openPLL();
};

ollBtn.onclick=e=>{
e.stopPropagation();
alert("OLL menu doplníme v další verzi. Teď je hotové PLL.");
};

closeModal.onclick=e=>{
e.stopPropagation();
modal.style.display="none";
};

modal.onclick=e=>{
if(e.target===modal) modal.style.display="none";
};

function openPLL(){
algList.innerHTML="";
Object.entries(pllAlgs).forEach(([name,alg])=>{
const b=document.createElement("button");
b.className="algBtn";
b.innerText=name;
b.onclick=e=>{
e.stopPropagation();
selectedAlg.innerText=name+": "+alg;
modal.style.display="none";
prepareNext();
};
algList.appendChild(b);
});
modal.style.display="block";
}

document.body.addEventListener("click",e=>{
if(e.target.tagName==="BUTTON") return;
if(modal.style.display==="block") return;
if(isSolving) manualStop();
});

function prepareNext(){
seq=[];moveTimes=[];tpsHistory=[];
totalMoves=0;maxTPS=0;longestPause=0;pendingMove=null;
notation.innerText="Notace:";
stateMsg.innerText=isConnected?"PŘIPRAVEN":"Připoj kostku...";
stateMsg.style.color="yellow";
tpsDiv.innerText="0.0";
timeVal.innerText="0.00s";
movesVal.innerText="0";
avgVal.innerText="0.0";
maxVal.innerText="0.0";
pauseVal.innerText="0.00s";
ctx.clearRect(0,0,canvas.width,canvas.height);
}

function baseFace(move){return String(move).replace("2","").replace("'","");}
function direction(move){return String(move).includes("'")?-1:1;}
function makeDoubleMove(move){return baseFace(move)+"2";}

function handleRawMove(move){
const now=performance.now();

if(!isSolving && seq.length>0){
prepareNext();
}

if(
pendingMove &&
baseFace(pendingMove)===baseFace(move) &&
direction(pendingMove)===direction(move) &&
now-pendingMoveTime<DOUBLE_MOVE_WINDOW
){
clearTimeout(pendingTimer);
const merged=makeDoubleMove(move);
pendingMove=null;
commitMove(merged,now);
return;
}

if(pendingMove){
clearTimeout(pendingTimer);
commitMove(pendingMove,pendingMoveTime);
}

pendingMove=move;
pendingMoveTime=now;

pendingTimer=setTimeout(()=>{
if(pendingMove){
commitMove(pendingMove,pendingMoveTime);
pendingMove=null;
}
},DOUBLE_MOVE_WINDOW);
}

function startSolve(now){
isSolving=true;
startTime=now;
lastMoveTime=now;
totalMoves=0;maxTPS=0;longestPause=0;
moveTimes=[];tpsHistory=[];seq=[];

stateMsg.innerText="SKLÁDÁŠ... KLEPNI PRO STOP";
stateMsg.style.color="#00e676";

timeVal.innerText="0.00s";
movesVal.innerText="0";
avgVal.innerText="0.0";
maxVal.innerText="0.0";
pauseVal.innerText="0.00s";
notation.innerText="Notace:";

clearInterval(uiTimer);
uiTimer=setInterval(updateUI,100);
}

function commitMove(move,now){
if(!isSolving){
startSolve(now);
}else{
const pause=(now-lastMoveTime)/1000;
if(totalMoves>0&&pause>longestPause){
longestPause=pause;
pauseVal.innerText=pause.toFixed(2)+"s";
}
}

lastMoveTime=now;
totalMoves++;
movesVal.innerText=totalMoves;

seq.push(move);
if(seq.length>24)seq.shift();
notation.innerText="Notace:\n"+seq.join(" ");

moveTimes.push(now);
clearTimeout(stopTimer);
stopTimer=setTimeout(()=>finishSolve(lastMoveTime,false),3000);
}

function updateUI(){
const now=performance.now();
moveTimes=moveTimes.filter(t=>now-t<TPS_WINDOW);
const currentTPS=moveTimes.length/(TPS_WINDOW/1000);

tpsDiv.innerText=currentTPS.toFixed(1);

if(isSolving){
const elapsed=(now-startTime)/1000;
timeVal.innerText=elapsed.toFixed(2)+"s";

if(elapsed>0){
const avg=totalMoves/elapsed;
avgVal.innerText=avg.toFixed(1);
if(totalMoves>8&&currentTPS<avg*.65&&now-lastBeep>1200){
beep(220,.12);
lastBeep=now;
}
}

if(currentTPS>maxTPS){
maxTPS=currentTPS;
maxVal.innerText=maxTPS.toFixed(1);
}

tpsHistory.push(currentTPS);
if(tpsHistory.length>100)tpsHistory.shift();
drawGraph();
}
}

function manualStop(){
const stopTime=performance.now();

if(pendingMove){
clearTimeout(pendingTimer);
commitMove(pendingMove,pendingMoveTime);
pendingMove=null;
}

finishSolve(stopTime,true);
}

function finishSolve(stopTime,manual){
if(!isSolving)return;

isSolving=false;
clearInterval(uiTimer);
clearTimeout(stopTimer);

const finalTime=(stopTime-startTime)/1000;
const finalAvg=finalTime>0?totalMoves/finalTime:0;

timeVal.innerText=finalTime.toFixed(2)+"s";
avgVal.innerText=finalAvg.toFixed(1);

moveTimes=[];
tpsDiv.innerText="0.0";

stateMsg.innerText=manual
?"ZASTAVENO - OTOČ PRO DALŠÍ"
:"HOTOVO - OTOČ PRO DALŠÍ";

stateMsg.style.color="yellow";

saveSolve(
Number(finalTime.toFixed(2)),
totalMoves,
Number(finalAvg.toFixed(1))
);

beep(880,.2);
}

function saveSolve(time,moves,avg){
savedSolves.unshift({time,moves,avg});
savedSolves=savedSolves.slice(0,25);
renderHistory();
}

function renderHistory(){
if(savedSolves.length===0){
historyList.innerText="-";
return;
}

historyList.innerHTML=savedSolves.map((s,i)=>`
<div class="hist-row">
<div class="hist-time">${i+1}. ${s.time.toFixed(2)}s</div>
<div class="hist-small">${s.moves}t</div>
<div class="hist-small">${s.avg.toFixed(1)}TPS</div>
</div>
`).join("");
}

function drawGraph(){
ctx.clearRect(0,0,canvas.width,canvas.height);
if(tpsHistory.length<2)return;

ctx.beginPath();
ctx.strokeStyle="rgba(0,230,118,.75)";
ctx.lineWidth=4;
ctx.lineJoin="round";

const step=canvas.width/100;

for(let i=0;i<tpsHistory.length;i++){
const x=i*step+(canvas.width-tpsHistory.length*step);
const y=canvas.height-(tpsHistory[i]/6)*canvas.height;
if(i===0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}
ctx.stroke();
}

/* PWA manifest */
const manifest={
name:"MG3i Trainer",
short_name:"MG Trainer",
start_url:".",
display:"fullscreen",
background_color:"#121212",
theme_color:"#121212",
icons:[]
};
const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
const link=document.createElement("link");
link.rel="manifest";
link.href=URL.createObjectURL(blob);
document.head.appendChild(link);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

</script>
</body>
</html>
