<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MG3i Trainer - Calibrated</title>
<style>
body{margin:0;background:#121212;color:white;font-family:Arial,sans-serif;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
button{padding:15px 30px;font-size:20px;font-weight:bold;border:none;border-radius:50px;background:#00e676;color:black;cursor:pointer;margin-bottom:15px;z-index:10;}
#status{color:#aaa;text-align:center;font-size:14px;height:20px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;width:90%;max-width:400px;text-align:center;margin-top:10px;z-index:10;}
.stat-box{background:#1e1e1e;padding:10px;border-radius:10px;border:1px solid #333;}
.stat-label{font-size:12px;color:#aaa;text-transform:uppercase;}
.stat-val{font-size:24px;font-weight:bold;color:#fff;}
#tps{font-size:110px;font-weight:bold;color:#00e5ff;margin:5px 0;line-height:1;z-index:10;}
#state-msg{font-size:20px;color:yellow;font-weight:bold;height:30px;margin-bottom:5px;z-index:10;}
canvas{position:absolute;bottom:0;left:0;width:100%;height:30%;z-index:1;pointer-events:none;}
</style>
</head>
<body>

<button id="btn">PŘIPOJIT KOSTKU</button>
<div id="status">Odpojeno</div>

<div id="state-msg">Připoj kostku...</div>
<div id="tps">0.0</div>

<div class="stats-grid">
    <div class="stat-box"><div class="stat-label">Čas</div><div id="time-val" class="stat-val">0.00s</div></div>
    <div class="stat-box"><div class="stat-label">Tahy</div><div id="moves-val" class="stat-val">0</div></div>
    <div class="stat-box"><div class="stat-label">Průměrné TPS</div><div id="avg-tps-val" class="stat-val" style="color:#00e676;">0.0</div></div>
    <div class="stat-box"><div class="stat-label">Max TPS</div><div id="max-tps-val" class="stat-val">0.0</div></div>
    <div class="stat-box" style="grid-column: span 2;"><div class="stat-label">Nejdelší pauza</div><div id="pause-val" class="stat-val" style="color:#ff1744;">0.00s</div></div>
</div>

<canvas id="graphCanvas"></canvas>

<script>
const btn=document.getElementById("btn");
const status=document.getElementById("status");
const tpsDiv=document.getElementById("tps");
const stateMsg=document.getElementById("state-msg");
const timeVal=document.getElementById("time-val");
const movesVal=document.getElementById("moves-val");
const avgTpsVal=document.getElementById("avg-tps-val");
const maxTpsVal=document.getElementById("max-tps-val");
const pauseVal=document.getElementById("pause-val");
const canvas=document.getElementById("graphCanvas");
const ctx=canvas.getContext("2d");

let moveTimes = [];
let totalMoves = 0;
let lastMoveTime = 0;
let maxTPS = 0;
let longestPause = 0;

let isSolving = false;
let startTime = 0;
let solveTimer = null;
let stopTimeout = null;

let audioCtx = null;
let lastBeepTime = 0;
let currentAvgXYZ = 0;
let tpsHistory = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.30;
}
window.onresize = resizeCanvas;
resizeCanvas();

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function beep(freq, duration) {
    try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

btn.onclick=async()=>{
    try {
        initAudio();
        status.innerText="Vyber MG3i";
        const device = await navigator.bluetooth.requestDevice({
            filters: [{namePrefix:"MG"}],
            optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dc4179']
        });

        status.innerText = "Připojování...";
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dc4179');
        const characteristic = await service.getCharacteristic('28be4cb6-cd67-11e9-a32f-2a2ae2dbcce4');

        await characteristic.startNotifications();
        status.innerText = "Připojeno: " + device.name;
        stateMsg.innerText = "PŘIPRAVEN! Udělej 10 tahů pro test.";
        btn.style.display = "none";

        setTimeout(() => { beep(523, 0.1); }, 1000);

        characteristic.addEventListener('characteristicvaluechanged', (event) => {
            const now = performance.now();
            
            // KALIBRACE: Ignoruj duplicitní signály vyslané během 45 milisekund od jednoho tahu
            if (now - lastMoveTime > 45) {
                handleMove(now);
                lastMoveTime = now;
            }
        });

        setInterval(() => {
            const now = performance.now();
            moveTimes = moveTimes.filter(t => now - t < 1000);
            let currentTPS = moveTimes.length;
            tpsDiv.innerText = currentTPS.toFixed(1);
            
            if (isSolving) {
                let elapsed = (now - startTime) / 1000;
                if (elapsed > 0) {
                    currentAvgXYZ = totalMoves / elapsed;
                    avgTpsVal.innerText = currentAvgXYZ.toFixed(1);
                }

                if (currentTPS > maxTPS) {
                    maxTPS = currentTPS;
                    maxTpsVal.innerText = maxTPS.toFixed(1);
                }

                if (totalMoves > 5 && currentTPS < (currentAvgXYZ * 0.7) && (now - lastBeepTime > 1000)) {
                    beep(240, 0.12);
                    lastBeepTime = now;
                }
                
                tpsHistory.push(currentTPS);
                if (tpsHistory.length > 100) tpsHistory.shift();
                drawGraph();
            }
        }, 100);

    } catch(e) {
        status.innerText = "Chyba: " + e.message;
    }
};

function handleMove(now) {
    if (!isSolving) {
        initAudio();
        isSolving = true;
        startTime = now;
        totalMoves = 0;
        maxTPS = 0;
        longestPause = 0;
        moveTimes = [];
        tpsHistory = [];
        stateMsg.innerText = "SKLÁDÁŠ...";
        stateMsg.style.color = "#00e676";
        
        solveTimer = setInterval(() => {
            let elapsed = (performance.now() - startTime) / 1000;
            timeVal.innerText = elapsed.toFixed(2) + "s";
        }, 50);
    } else {
        let currentPause = (now - lastMoveTime) / 1000;
        if (currentPause > longestPause && totalMoves > 0) {
            longestPause = currentPause;
            pauseVal.innerText = longestPause.toFixed(2) + "s";
        }
    }

    moveTimes.push(now);
    totalMoves++;
    movesVal.innerText = totalMoves;

    clearTimeout(stopTimeout);
    stopTimeout = setTimeout(() => {
        finishSolve();
    }, 2500);
}

function finishSolve() {
    isSolving = false;
    clearInterval(solveTimer);
    stateMsg.innerText = "SOLVE DOKONČEN!";
    stateMsg.style.color = "yellow";
    
    let finalTime = ((lastMoveTime - startTime) / 1000);
    if(finalTime < 0) finalTime = 0;
    timeVal.innerText = finalTime.toFixed(2) + "s";
    
    if (finalTime > 0) {
        let finalAvg = totalMoves / finalTime;
        avgTpsVal.innerText = finalAvg.toFixed(1);
    }
    
    beep(659, 0.25);
}

function drawGraph() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (tpsHistory.length < 2) return;
    
    ctx.beginPath();
    ctx.strokeStyle = "rgba(0, 230, 118, 0.6)";
    ctx.lineWidth = 4;
    ctx.lineJoin = "round";
    
    let step = canvas.width / 100;
    
    for (let i = 0; i < tpsHistory.length; i++) {
        let x = i * step + (canvas.width - tpsHistory.length * step);
        let y = canvas.height - (tpsHistory[i] / 12) * canvas.height;
        
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
}
</script>
</body>
</html>
