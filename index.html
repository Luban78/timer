<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MG3i Signal Analyzer v3.2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
body{
margin:0;
background:#0c0f12;
color:#e2e8f0;
font-family:'Courier New',monospace;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
min-height:100vh;
padding:20px;
box-sizing:border-box;
}
#version-tag {
font-family: sans-serif;
font-size: 14px;
font-weight: bold;
color: #ffeb3b;
background: rgba(255,235,59,0.1);
padding: 4px 12px;
border-radius: 20px;
border: 1px solid #ffeb3b;
margin-bottom: 15px;
}
button{
padding:15px 30px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:8px;
background:#ffeb3b;
color:black;
margin-bottom:20px;
cursor:pointer;
font-family:sans-serif;
box-shadow: 0 4px 15px rgba(255,235,59,0.3);
}
#status{
color:#a0aec0;
font-size:14px;
margin-bottom:20px;
font-family:sans-serif;
}
.console{
background:#1a202c;
border:2px solid #4a5568;
border-radius:10px;
padding:15px;
width:100%;
max-width:550px;
box-sizing:border-box;
}
.row{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #2d3748;
font-size:13px;
}
.index{ color:#ecc94b; font-weight:bold; width: 80px; }
.val{ color:#63b3ed; width: 140px; }
.desc{ color:#a0aec0; font-style: italic; }
.changed{ background: rgba(245, 158, 11, 0.2); }
</style>
</head>
<body>

<div id="version-tag">VERZE APLIKACE: v3.2 (SIGNAL INTERPRETER)</div>

<button id="btn">SPUSTIT ANALÝZU SIGNÁLŮ</button>
<div id="status">Odpojeno</div>

<div class="console" id="console-box">
    <div style="text-align:center;color:#718096;">Připoj kostku a plynule otoč stěnou.</div>
</div>

<script>
const btn=document.getElementById("btn");
const status=document.getElementById("status");
const consoleBox=document.getElementById("console-box");

// Výchozí klíč pro řadu GAN/MG
const AES_KEY_HEX = "2d565c3412ab00000000000000000000"; 
const key = CryptoJS.enc.Hex.parse(AES_KEY_HEX);

let previousBytes = new Array(16).fill(0);

// Popisky, co by který bajt měl teoreticky v protokolu znamenat
const SIGNAL_MAP = [
    "HW Časovač (Timestamp LSB)",
    "HW Časovač (Timestamp)",
    "HW Časovač (Timestamp)",
    "HW Časovač (Timestamp MSB)",
    "Identifikátor tahu / Směr stěny",
    "Čítač provedených tahů",
    "Stav stěny U (Bílá)",
    "Stav stěny R (Červená)",
    "Stav stěny F (Zelená)",
    "Stav stěny D (Žlutá)",
    "Stav stěny L (Oranžová)",
    "Stav stěny B (Modrá)",
    "Baterie / Systémový signál",
    "Rezervováno / Volné",
    "Rezervováno / Volné",
    "Rezervováno / Volné"
];

btn.onclick=async()=>{
    try{
        status.innerText="Hledám Bluetooth kostku...";
        const device=await navigator.bluetooth.requestDevice({
            filters:[{namePrefix:"MG"}, {namePrefix:"GAN"}],
            optionalServices:["6e400001-b5a3-f393-e0a9-e50e24dc4179"]
        });

        const server=await device.gatt.connect();
        const service=await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dc4179");
        const characteristic=await service.getCharacteristic("28be4cb6-cd67-11e9-a32f-2a2ae2dbcce4");

        await characteristic.startNotifications();

        btn.style.display="none";
        status.innerText="Interpretuji signály z: " + device.name;

        characteristic.addEventListener("characteristicvaluechanged",event=>{
            const value=event.target.value;
            if(value.byteLength < 16) return;

            // Izolujeme přesně prvních 16 bajtů pro AES-128 dešifrování
            let cleanBytes = new Uint8Array(16);
            for(let i=0; i<16; i++) {
                cleanBytes[i] = value.getUint8(i);
            }

            let wordArray = CryptoJS.lib.WordArray.create(cleanBytes);
            let decrypted = CryptoJS.AES.decrypt(
                { ciphertext: wordArray },
                key,
                { mode: CryptoJS.mode.ECB, padding: CryptoJS.pad.NoPadding }
            );

            let decBytes = [];
            for (let i = 0; i < 16; i++) {
                decBytes.push((decrypted.words[i >>> 2] >>> (24 - (i % 4) * 8)) & 0xff);
            }

            let html = "";
            for(let i=0; i<16; i++) {
                let decVal = decBytes[i];
                let hexVal = decVal.toString(16).toUpperCase().padStart(2, '0');
                let changeClass = (decVal !== previousBytes[i]) ? "changed" : "";

                html += `<div class="row ${changeClass}">`;
                html += `  <span class="index">Bajt [${String(i).padStart(2, '0')}]</span>`;
                html += `  <span class="val">0x${hexVal} (${String(decVal).padStart(3, ' ')})</span>`;
                html += `  <span class="desc">→ ${SIGNAL_MAP[i]}</span>`;
                html += `</div>`;
            }

            consoleBox.innerHTML = html;
            previousBytes = [...decBytes];
        });

    }catch(e){
        status.innerText="Chyba: " + e.message;
    }
};
</script>
</body>
</html>
