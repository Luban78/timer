<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MG3i Smart Timer</title>
<style>
body{
margin:0;
background:#121212;
color:white;
font-family:Arial,sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
user-select:none;
}
#stop-zone{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
button{
padding:15px 30px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:50px;
background:#00e676;
color:black;
margin-bottom:20px;
z-index:10;
position:relative;
}
#status{
color:#aaa;
font-size:14px;
height:20px;
margin-bottom:10px;
z-index:5;
}
#state-msg{
font-size:28px;
font-weight:bold;
height:40px;
color:yellow;
margin-bottom:20px;
}
#time-val{
font-size:120px;
font-weight:bold;
color:#00e5ff;
line-height:1;
font-variant-numeric: tabular-nums;
}
#hint{
font-size:16px;
color:#666;
margin-top:30px;
text-align:center;
}
</style>
</head>
<body>

<div id="stop-zone">
    <button id="btn">PŘIPOJIT KOSTKU</button>
    <div id="status">Odpojeno</div>
    <div id="state-msg">Připoj kostku</div>
    <div id="time-val">0.00</div>
    <div id="hint">Pro start otoč kostkou<br>Pro stop klepni kamkoliv na obrazovku</div>
</div>

<script>
const btn=document.getElementById("btn");
const status=document.getElementById("status");
const state=document.getElementById("state-msg");
const timeVal=document.getElementById("time-val");
const stopZone=document.getElementById("stop-zone");

let solving=false;
let startTime=0;
let timer=null;
let readyToStart=false;

btn.onclick=async(e)=>{
    e.stopPropagation(); // Zabrání okamžitému stopnutí při kliku na tlačítko
    try{
        status.innerText="Vyber MG3i";
        const device=await navigator.bluetooth.requestDevice({
            filters:[{namePrefix:"MG"}, {namePrefix:"GAN"}],
            optionalServices:["6e400001-b5a3-f393-e0a9-e50e24dc4179"]
        });

        const server=await device.gatt.connect();
        const service=await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dc4179");
        const characteristic=await service.getCharacteristic("28be4cb6-cd67-11e9-a32f-2a2ae2dbcce4");

        await characteristic.startNotifications();

        btn.style.display="none";
        status.innerText="Připojeno: "+device.name;
        state.innerText="PŘIPRAVEN";
        readyToStart=true;

        characteristic.addEventListener("characteristicvaluechanged",()=>{
            // Jakýkoliv signál z kostky odpálí start, pokud zrovna neskládáme
            if(readyToStart && !solving){
                startSolve();
            }
        });

    }catch(err){
        status.innerText=err.message;
    }
};

function startSolve(){
    solving=true;
    readyToStart=false;
    startTime=performance.now();
    state.innerText="SKLÁDÁŠ";
    state.style.color="#00e676";

    timer=setInterval(()=>{
        let t=(performance.now()-startTime)/1000;
        timeVal.innerText=t.toFixed(2);
    },10);
}

// Klepnutí kamkoliv na obrazovku stopne čas
stopZone.onclick=()=>{
    if(solving){
        solving=false;
        clearInterval(timer);
        
        let finalTime=(performance.now()-startTime)/1000;
        timeVal.innerText=finalTime.toFixed(2);
        
        state.innerText="SOLVE DOKONČEN!";
        state.style.color="yellow";
        
        // Za 1.5 sekundy připraví časovač na další pokus
        setTimeout(()=>{
            if(!solving){
                state.innerText="PŘIPRAVEN";
                readyToStart=true;
            }
        },1500);
    }
};
</script>
</body>
</html>
