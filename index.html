<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">

<title>MG3i Trainer - Advanced Decoder</title>

<style>
body{
margin:0;
background:#121212;
color:white;
font-family:Arial,sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

button{
padding:15px 30px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:50px;
background:#00e676;
color:black;
margin-bottom:15px;
}

#status{
color:#ffeb3b;
font-size:12px;
height:auto;
margin-bottom:5px;
text-align:center;
word-break:break-all;
max-width:90%;
}

#state-msg{
font-size:22px;
font-weight:bold;
height:30px;
color:yellow;
}

#tps{
font-size:100px;
font-weight:bold;
color:#00e5ff;
line-height:1;
margin:10px;
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
width:90%;
max-width:400px;
}

.stat-box{
background:#1e1e1e;
padding:12px;
border-radius:12px;
text-align:center;
border:1px solid #333;
}

.stat-label{
font-size:12px;
color:#999;
}

.stat-val{
font-size:22px;
font-weight:bold;
}

canvas{
position:absolute;
bottom:0;
left:0;
width:100%;
height:30%;
pointer-events:none;
}
</style>
</head>

<body>

<button id="btn">PŘIPOJIT KOSTKU</button>
<div id="status">Odpojeno</div>
<div id="state-msg">Připoj kostku</div>
<div id="tps">0.0</div>

<div class="stats-grid">
    <div class="stat-box">
        <div class="stat-label">ČAS</div>
        <div id="time-val" class="stat-val">0.00s</div>
    </div>

    <div class="stat-box">
        <div class="stat-label">TAHY</div>
        <div id="moves-val" class="stat-val">0</div>
    </div>

    <div class="stat-box">
        <div class="stat-label">PRŮMĚRNÉ TPS</div>
        <div id="avg-val" class="stat-val" style="color:#00e676">0.0</div>
    </div>

    <div class="stat-box">
        <div class="stat-label">MAX TPS</div>
        <div id="max-val" class="stat-val">0.0</div>
    </div>

    <div class="stat-box" style="grid-column:span 2">
        <div class="stat-label">NEJDELŠÍ PAUZA</div>
        <div id="pause-val" class="stat-val" style="color:#ff1744">0.00s</div>
    </div>
</div>

<canvas id="graph"></canvas>

<script>
const btn=document.getElementById("btn");
const status=document.getElementById("status");
const state=document.getElementById("state-msg");
const tps=document.getElementById("tps");

const timeVal=document.getElementById("time-val");
const movesVal=document.getElementById("moves-val");
const avgVal=document.getElementById("avg-val");
const maxVal=document.getElementById("max-val");
const pauseVal=document.getElementById("pause-val");

const canvas=document.getElementById("graph");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight*.3;

let moveTimes=[];
let totalMoves=0;
let maxTPS=0;
let longestPause=0;

let lastMoveTime=0;
let lastMoveCounter = -1;

let solving=false;
let startTime=0;

let timer=null;
let stopTimer=null;

let graph=[];

btn.onclick=async()=>{
    try{
        status.innerText="Vyber MG3i";

        const device=await navigator.bluetooth.requestDevice({
            filters:[{namePrefix:"MG"}, {namePrefix:"GAN"}],
            optionalServices:["6e400001-b5a3-f393-e0a9-e50e24dc4179"]
        });

        const server=await device.gatt.connect();
        const service=await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dc4179");
        const characteristic=await service.getCharacteristic("28be4cb6-cd67-11e9-a32f-2a2ae2dbcce4");

        await characteristic.startNotifications();

        btn.style.display="none";
        status.innerText="Připojeno. Otoč libovolnou stěnou...";
        state.innerText="PŘIPRAVEN";

        characteristic.addEventListener("characteristicvaluechanged",event=>{
            const now=performance.now();
            const value=event.target.value;

            if(value.byteLength < 6) return;

            // Přečteme bajty pro analýzu
            const bytes = [];
            for(let i=0; i<value.byteLength; i++) {
                bytes.push(value.getUint8(i));
            }

            // Zobrazíme surové bajty žlutě nahoře na displeji, abychom viděli, co kostka posílá
            status.innerText = "Bytes: " + bytes.slice(0, 8).join(",");

            // GAN/MG standard: Počítadlo tahů bývá na bajtu 2 nebo se posílá stav v bajtu 1
            // Vyzkoušíme bezpečné sledování změny v poli pohybů (bajt 1 a bajt 2)
            const currentCounter = bytes[2];
            const moveInfo = bytes[1];

            // Pokud se nezměnilo počítadlo ani stav, je to duplicita
            if(currentCounter === lastMoveCounter) {
                return;
            }

            // Časová pojistka - lidské maximum je pod 15 TPS (cca 70ms mezi tahy)
            if(now - lastMoveTime < 65){
                return;
            }

            lastMoveCounter = currentCounter;
            lastMoveTime = now;

            handleMove(now);
        });

        setInterval(updateTPS,100);

    }catch(e){
        status.innerText=e.message;
    }
};

function handleMove(now){
    if(!solving){
        solving=true;
        startTime=now;
        totalMoves=0;
        maxTPS=0;
        longestPause=0;
        moveTimes=[];
        graph=[];

        state.innerText="SKLÁDÁŠ";

        timer=setInterval(()=>{
            let t=(performance.now()-startTime)/1000;
            timeVal.innerText=t.toFixed(2)+"s";
        },50);
    }else{
        let pause=(now-lastMoveTime)/1000;
        if(pause>longestPause){
            longestPause=pause;
            pauseVal.innerText=pause.toFixed(2)+"s";
        }
    }

    moveTimes.push(now);
    totalMoves++;
    movesVal.innerText=totalMoves;

    clearTimeout(stopTimer);
    stopTimer=setTimeout(finishSolve,2500);
}

function updateTPS(){
    const now=performance.now();
    moveTimes=moveTimes.filter(t=>now-t<1000);
    const current=moveTimes.length;

    tps.innerText=current.toFixed(1);

    if(solving){
        let elapsed=(now-startTime)/1000;
        let avg=totalMoves/elapsed;
        avgVal.innerText=avg.toFixed(1);

        if(current>maxTPS){
            maxTPS=current;
            maxVal.innerText=maxTPS.toFixed(1);
        }

        graph.push(current);
        if(graph.length>100){
            graph.shift();
        }
        drawGraph();
    }
}

function finishSolve(){
    solving=false;
    clearInterval(timer);
    state.innerText="SOLVE DOKONČEN!";
}

function drawGraph(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(graph.length<2) return;

    ctx.beginPath();
    ctx.strokeStyle="#00e676";
    ctx.lineWidth=4;

    let step=canvas.width/100;

    for(let i=0;i<graph.length;i++){
        let x=i*step;
        let y=canvas.height-(graph[i]/10)*canvas.height;

        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }
    ctx.stroke();
}
</script>

</body>
</html>
