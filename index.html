<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MG3i Full Packet Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
body{
margin:0;
background:#121212;
color:white;
font-family:Arial,sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
}
button{
padding:15px 30px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:50px;
background:#00e676;
color:black;
margin-bottom:15px;
cursor:pointer;
}
#status{
color:#999;
font-size:13px;
margin-bottom:5px;
}
#packet-display{
font-size:18px;
font-family:monospace;
color:#ffeb3b;
background:#222;
padding:15px;
border-radius:10px;
border:1px solid #444;
width:90%;
max-width:450px;
word-break:break-all;
text-align:center;
margin-top:20px;
}
.info{
color:#00e5ff;
font-size:14px;
margin-top:10px;
text-align:center;
width:90%;
}
</style>
</head>
<body>

<button id="btn">PŘIPOJIT KOSTKU</button>
<div id="status">Odpojeno</div>

<div style="font-size:24px;font-weight:bold;color:white;">DEŠIFROVANÝ BALÍČEK:</div>
<div id="packet-display">ČEKÁM NA TAH...</div>

<div class="info">Otoč stěnou a aplikace ti ukáže všech 16 dešifrovaných bajtů za sebou.</div>

<script>
const btn=document.getElementById("btn");
const status=document.getElementById("status");
const packetDisplay=document.getElementById("packet-display");

// Tvůj ověřený klíč pro MAC: AB:12:34:5C:56:2D
const AES_KEY_HEX = "2d565c3412ab00000000000000000000"; 
const key = CryptoJS.enc.Hex.parse(AES_KEY_HEX);

btn.onclick=async()=>{
    try{
        status.innerText="Vyber MG3i";
        const device=await navigator.bluetooth.requestDevice({
            filters:[{namePrefix:"MG"}, {namePrefix:"GAN"}],
            optionalServices:["6e400001-b5a3-f393-e0a9-e50e24dc4179"]
        });

        const server=await device.gatt.connect();
        const service=await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dc4179");
        const characteristic=await service.getCharacteristic("28be4cb6-cd67-11e9-a32f-2a2ae2dbcce4");

        await characteristic.startNotifications();

        btn.style.display="none";
        status.innerText="Připojeno ke kostce: "+device.name;
        packetDisplay.innerText="OTOČ KOSTKOU!";

        characteristic.addEventListener("characteristicvaluechanged",event=>{
            const value=event.target.value;

            if(value.byteLength < 16) return;

            let uint8Array = new Uint8Array(value.buffer);
            let wordArray = CryptoJS.lib.WordArray.create(uint8Array);

            // 🔓 Dekódování kompletního bloku
            let decrypted = CryptoJS.AES.decrypt(
                { ciphertext: wordArray },
                key,
                { mode: CryptoJS.mode.ECB, padding: CryptoJS.pad.NoPadding }
            );

            let decBytes = [];
            for (let i = 0; i < 16; i++) {
                decBytes.push((decrypted.words[i >>> 2] >>> (24 - (i % 4) * 8)) & 0xff);
            }

            // Spojíme všech 16 bajtů s popiskem indexů pro snadné čtení
            let output = "";
            for(let i=0; i<16; i++) {
                output += "[" + i + "]:" + decBytes[i] + " ";
                if(i === 7) output += "<br>"; // Rozdělení na dva řádky, ať se to vejde na mobil
            }

            packetDisplay.innerHTML = output;
        });

    }catch(e){
        status.innerText=e.message;
    }
};
</script>
</body>
</html>
