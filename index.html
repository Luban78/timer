<!DOCTYPE html>
<html lang="cs">
<head>
    
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes"> 
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MG Trainer">
<title>MG3i Trainer v0.15</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">
<button id="btn">PŘIPOJIT KOSTKU v3</button>

<div id="modeButtons">
<button class="modeBtn" id="ollBtn">OLL</button>
<button class="modeBtn" id="pllBtn">PLL</button>
</div>

<div id="status">Odpojeno</div>

<div id="selectedAlg">Algoritmus: nevybráno</div>
<div id="notation">Notace:</div>

<div id="state-msg">Připoj kostku...</div>
<div id="tps">0.0</div> 

<div class="stats-grid">
<div class="stat-box"><div class="stat-label">Čas</div><div id="time-val" class="stat-val">0.00s</div></div>
<div class="stat-box"><div class="stat-label">Tahy HTM</div><div id="moves-val" class="stat-val">0</div></div>
<div class="stat-box"><div class="stat-label">Průměr TPS</div><div id="avg-val" class="stat-val" style="color:#00e676">0.0</div></div>
<div class="stat-box"><div class="stat-label">Špička TPS</div><div id="max-val" class="stat-val">0.0</div></div>
<div class="stat-box" style="grid-column:span 2"><div class="stat-label">Nejdelší pauza</div><div id="pause-val" class="stat-val" style="color:#ff1744">0.00s</div></div>
</div>
<div id="version">v0.15 detail graph</div>
<canvas id="graph"></canvas>
</div>

<div id="history">
  <h2>ČASY</h2>
  
  <div id="stats-box">
    <div>Best: <span id="stat-best">-</span></div>
    <div>Ao3: <span id="stat-ao3">-</span></div>
    <div>Ao5: <span id="stat-ao5">-</span></div>
    <div>Ao12: <span id="stat-ao12">-</span></div>
    <div>Ao100: <span id="stat-ao100">-</span></div>
    <div>Solves: <span id="stat-count">0</span></div>
  </div>
  
  <button id="clear-history-btn">Vymazat časy</button>
  
  <div id="history-list"></div>
</div>

<div id="modal">
<div id="modalContent">
<h2 id="modalTitle">PLL</h2>
<div class="algGrid" id="algList"></div>
<button class="closeBtn" id="closeModal">ZAVŘÍT</button>
</div>
</div>

<div id="solve-detail" class="detail-modal">
  <div class="detail-box">
    <h2>Detail solve</h2>
    <div id="solve-detail-content"></div>
    <canvas id="detail-graph"></canvas>
    <button id="close-detail-btn" class="closeBtn">Zavřít</button>
  </div>
</div>

<script type="module" src="./app.js"></script>


</body>
</html>
