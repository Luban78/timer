<!DOCTYPE html>
<html lang="cs">
<head>
    
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes"> 
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MG Trainer">
<title>MG3i Trainer Test</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">
<button id="btn">PŘIPOJIT KOSTKU v2</button>

<div id="modeButtons">
<button class="modeBtn" id="ollBtn">OLL</button>
<button class="modeBtn" id="pllBtn">PLL</button>
</div>

<div id="status">Odpojeno</div>

<div id="selectedAlg">Algoritmus: nevybráno</div>
<div id="notation">Notace:</div>

<div id="state-msg">Připoj kostku...</div>
<div id="tps">0.0</div>

<div class="stats-grid">
<div class="stat-box"><div class="stat-label">Čas</div><div id="time-val" class="stat-val">0.00s</div></div>
<div class="stat-box"><div class="stat-label">Tahy HTM</div><div id="moves-val" class="stat-val">0</div></div>
<div class="stat-box"><div class="stat-label">Průměr TPS</div><div id="avg-val" class="stat-val" style="color:#00e676">0.0</div></div>
<div class="stat-box"><div class="stat-label">Špička TPS</div><div id="max-val" class="stat-val">0.0</div></div>
<div class="stat-box" style="grid-column:span 2"><div class="stat-label">Nejdelší pauza</div><div id="pause-val" class="stat-val" style="color:#ff1744">0.00s</div></div>
</div>
<div id="version">v0.10 modular</div>
<canvas id="graph"></canvas>
</div>

<div id="history">
<div id="history-title">ČASY</div>
<div id="history-list">-</div>
</div>

<div id="modal">
<div id="modalContent">
<h2 id="modalTitle">PLL</h2>
<div class="algGrid" id="algList"></div>
<button class="closeBtn" id="closeModal">ZAVŘÍT</button>
</div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
