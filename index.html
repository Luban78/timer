<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MG3i Trainer HTM</title>

<style>
body{
margin:0;background:#121212;color:white;font-family:Arial,sans-serif;
min-height:100vh;overflow:hidden;box-sizing:border-box;
display:flex;justify-content:center;
}

#app{
width:calc(100vw - 96px);
max-width:430px;
padding:14px 92px 14px 8px;
box-sizing:border-box;
display:flex;
flex-direction:column;
align-items:center;
}

button{
padding:14px 24px;font-size:18px;font-weight:bold;border:none;
border-radius:50px;background:#00e676;color:black;margin-bottom:8px;
}

#status{color:#aaa;font-size:14px;margin-bottom:8px;text-align:center}

#notation{
width:100%;background:#1e1e1e;border:1px solid #333;border-radius:10px;
padding:10px;margin-bottom:8px;font-family:monospace;font-size:17px;
color:#ffea00;word-break:break-word;min-height:64px;box-sizing:border-box;
}

#state-msg{font-size:19px;color:yellow;font-weight:bold;min-height:28px;text-align:center}

#tps{
font-size:86px;font-weight:bold;color:#00e5ff;line-height:1;margin:4px 0;
}

.stats-grid{
display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;z-index:2;
}

.stat-box{
background:#1e1e1e;padding:9px;border-radius:10px;border:1px solid #333;text-align:center;
}

.stat-label{font-size:11px;color:#aaa;text-transform:uppercase}
.stat-val{font-size:23px;font-weight:bold}

canvas{
position:absolute;bottom:0;left:0;width:calc(100% - 92px);height:25%;
pointer-events:none;
}

#history{
position:fixed;
right:4px;
top:8px;
bottom:8px;
width:84px;
overflow:auto;
background:rgba(30,30,30,.92);
border:1px solid #333;
border-radius:10px;
padding:6px;
font-size:11px;
z-index:20;
box-sizing:border-box;
}

#history-title{
color:#aaa;font-size:11px;margin-bottom:6px;text-align:center;
position:sticky;top:0;background:#1e1e1e;
}

.hist-row{
border-bottom:1px solid #333;
padding:5px 0;
}

.hist-time{
color:#00e5ff;
font-weight:bold;
font-size:12px;
}

.hist-small{
color:#aaa;
font-size:9px;
line-height:1.2;
}
</style>
</head>

<body>

<div id="app">

<button id="btn">PŘIPOJIT KOSTKU</button>
<div id="status">Odpojeno</div>

<div id="notation">Notace:</div>

<div id="state-msg">Připoj kostku...</div>

<div id="tps">0.0</div>

<div class="stats-grid">
<div class="stat-box"><div class="stat-label">Čas</div><div id="time-val" class="stat-val">0.00s</div></div>
<div class="stat-box"><div class="stat-label">Tahy HTM</div><div id="moves-val" class="stat-val">0</div></div>
<div class="stat-box"><div class="stat-label">Průměr TPS</div><div id="avg-val" class="stat-val" style="color:#00e676">0.0</div></div>
<div class="stat-box"><div class="stat-label">Špička TPS</div><div id="max-val" class="stat-val">0.0</div></div>
<div class="stat-box" style="grid-column:span 2"><div class="stat-label">Nejdelší pauza</div><div id="pause-val" class="stat-val" style="color:#ff1744">0.00s</div></div>
</div>

<canvas id="graph"></canvas>

</div>

<div id="history">
<div id="history-title">ČASY</div>
<div id="history-list">-</div>
</div>

<script type="module">
import { connectGanCube } from "https://esm.sh/gan-web-bluetooth";

const btn=document.getElementById("btn");
const status=document.getElementById("status");
const notation=document.getElementById("notation");
const stateMsg=document.getElementById("state-msg");
const tpsDiv=document.getElementById("tps");
const timeVal=document.getElementById("time-val");
const movesVal=document.getElementById("moves-val");
const avgVal=document.getElementById("avg-val");
const maxVal=document.getElementById("max-val");
const pauseVal=document.getElementById("pause-val");
const historyList=document.getElementById("history-list");
const canvas=document.getElementById("graph");
const ctx=canvas.getContext("2d");

let seq=[],moveTimes=[],tpsHistory=[],savedSolves=[];
let totalMoves=0,maxTPS=0,longestPause=0;
let isSolving=false,isFinished=false,isConnected=false;
let startTime=0,lastMoveTime=0;
let uiTimer=null,stopTimer=null;
let pendingMove=null,pendingMoveTime=0,pendingTimer=null;
let audioCtx=null,lastBeep=0;

const DOUBLE_MOVE_WINDOW=280;
const TPS_WINDOW=2000;

function resize(){
canvas.width=window.innerWidth-92;
canvas.height=window.innerHeight*.25;
}
window.onresize=resize;
resize();

function initAudio(){
if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
if(audioCtx.state==="suspended") audioCtx.resume();
}

function beep(freq=240,dur=.12){
try{
initAudio();
const o=audioCtx.createOscillator();
const g=audioCtx.createGain();
o.frequency.value=freq;
g.gain.setValueAtTime(.06,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(.00001,audioCtx.currentTime+dur);
o.connect(g);g.connect(audioCtx.destination);
o.start();o.stop(audioCtx.currentTime+dur);
}catch(e){}
}

btn.onclick=async(e)=>{
e.stopPropagation();

try{
initAudio();
status.innerText="Připojuji...";

const cube=await connectGanCube();

cube.events$.subscribe(event=>{
if(event.type==="MOVE") handleRawMove(event.move);
if(event.type==="FACELETS") status.innerText="Připojeno + stav načten";
});

if(typeof cube.sendCubeCommand==="function"){
await cube.sendCubeCommand({type:"REQUEST_FACELETS"});
}

isConnected=true;
status.innerText="Připojeno, začni otočením kostky";
stateMsg.innerText="PŘIPRAVEN";
btn.style.display="none";
beep(523,.08);

}catch(e){
status.innerText="Chyba: "+e.message;
}
};

document.body.addEventListener("click",e=>{
if(e.target.tagName==="BUTTON") return;

if(isSolving){
manualStop();
return;
}

if(isFinished){
prepareNext();
}
});

function prepareNext(){
isFinished=false;
seq=[];
moveTimes=[];
tpsHistory=[];
totalMoves=0;
maxTPS=0;
longestPause=0;
pendingMove=null;

notation.innerText="Notace:";
stateMsg.innerText=isConnected ? "PŘIPRAVEN" : "Připoj kostku...";
stateMsg.style.color="yellow";
tpsDiv.innerText="0.0";
timeVal.innerText="0.00s";
movesVal.innerText="0";
avgVal.innerText="0.0";
maxVal.innerText="0.0";
pauseVal.innerText="0.00s";
ctx.clearRect(0,0,canvas.width,canvas.height);
}

function baseFace(move){
return String(move).replace("2","").replace("'","");
}

function direction(move){
return String(move).includes("'")?-1:1;
}

function makeDoubleMove(move){
return baseFace(move)+"2";
}

function handleRawMove(move){
if(isFinished)return;

const now=performance.now();

if(
pendingMove &&
baseFace(pendingMove)===baseFace(move) &&
direction(pendingMove)===direction(move) &&
now-pendingMoveTime<DOUBLE_MOVE_WINDOW
){
clearTimeout(pendingTimer);
const merged=makeDoubleMove(move);
pendingMove=null;
commitMove(merged,now);
return;
}

if(pendingMove){
clearTimeout(pendingTimer);
commitMove(pendingMove,pendingMoveTime);
}

pendingMove=move;
pendingMoveTime=now;

pendingTimer=setTimeout(()=>{
if(pendingMove){
commitMove(pendingMove,pendingMoveTime);
pendingMove=null;
}
},DOUBLE_MOVE_WINDOW);
}

function startSolve(now){
isSolving=true;
isFinished=false;
startTime=now;
lastMoveTime=now;

totalMoves=0;
maxTPS=0;
longestPause=0;
moveTimes=[];
tpsHistory=[];
seq=[];

stateMsg.innerText="SKLÁDÁŠ... KLEPNI PRO STOP";
stateMsg.style.color="#00e676";

timeVal.innerText="0.00s";
movesVal.innerText="0";
avgVal.innerText="0.0";
maxVal.innerText="0.0";
pauseVal.innerText="0.00s";
notation.innerText="Notace:";

clearInterval(uiTimer);
uiTimer=setInterval(updateUI,100);
}

function commitMove(move,now){
if(!isSolving){
startSolve(now);
}else{
const pause=(now-lastMoveTime)/1000;
if(totalMoves>0&&pause>longestPause){
longestPause=pause;
pauseVal.innerText=pause.toFixed(2)+"s";
}
}

lastMoveTime=now;
totalMoves++;
movesVal.innerText=totalMoves;

seq.push(move);
if(seq.length>24)seq.shift();
notation.innerText="Notace:\n"+seq.join(" ");

moveTimes.push(now);

clearTimeout(stopTimer);
stopTimer=setTimeout(()=>finishSolve(lastMoveTime,false),3000);
}

function updateUI(){
const now=performance.now();

moveTimes=moveTimes.filter(t=>now-t<TPS_WINDOW);
const currentTPS=moveTimes.length/(TPS_WINDOW/1000);

tpsDiv.innerText=currentTPS.toFixed(1);

if(isSolving){
const elapsed=(now-startTime)/1000;
timeVal.innerText=elapsed.toFixed(2)+"s";

if(elapsed>0){
const avg=totalMoves/elapsed;
avgVal.innerText=avg.toFixed(1);

if(totalMoves>8&&currentTPS<avg*.65&&now-lastBeep>1200){
beep(220,.12);
lastBeep=now;
}
}

if(currentTPS>maxTPS){
maxTPS=currentTPS;
maxVal.innerText=maxTPS.toFixed(1);
}

tpsHistory.push(currentTPS);
if(tpsHistory.length>100)tpsHistory.shift();

drawGraph();
}
}

function manualStop(){
const stopTime=performance.now();

if(pendingMove){
clearTimeout(pendingTimer);
commitMove(pendingMove,pendingMoveTime);
pendingMove=null;
}

finishSolve(stopTime,true);
}

function finishSolve(stopTime,manual){
if(!isSolving)return;

isSolving=false;
isFinished=true;
clearInterval(uiTimer);
clearTimeout(stopTimer);

const finalTime=(stopTime-startTime)/1000;
timeVal.innerText=finalTime.toFixed(2)+"s";

const finalAvg=finalTime>0?totalMoves/finalTime:0;
avgVal.innerText=finalAvg.toFixed(1);

moveTimes=[];
tpsDiv.innerText="0.0";
stateMsg.innerText=manual?"ZASTAVENO - KLEPNI PRO DALŠÍ":"SOLVE DOKONČEN - KLEPNI PRO DALŠÍ";
stateMsg.style.color="yellow";

saveSolve(finalTime,totalMoves,finalAvg);
beep(880,.2);
}

function saveSolve(time,moves,avg){
savedSolves.unshift({time,moves,avg});
savedSolves=savedSolves.slice(0,25);
renderHistory();
}

function renderHistory(){
if(savedSolves.length===0){
historyList.innerText="-";
return;
}

historyList.innerHTML=savedSolves.map((s,i)=>`
<div class="hist-row">
<div class="hist-time">${i+1}. ${s.time.toFixed(2)}</div>
<div class="hist-small">${s.moves}t</div>
<div class="hist-small">${s.avg.toFixed(1)}TPS</div>
</div>
`).join("");
}

function drawGraph(){
ctx.clearRect(0,0,canvas.width,canvas.height);
if(tpsHistory.length<2)return;

ctx.beginPath();
ctx.strokeStyle="rgba(0,230,118,.75)";
ctx.lineWidth=4;
ctx.lineJoin="round";

const step=canvas.width/100;

for(let i=0;i<tpsHistory.length;i++){
const x=i*step+(canvas.width-tpsHistory.length*step);
const y=canvas.height-(tpsHistory[i]/6)*canvas.height;

if(i===0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}

ctx.stroke();
}
</script>
</body>
</html>
