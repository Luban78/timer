<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MG3i Deep Scanner v5.3</title>
<style>
body { margin:0; background:#070a0e; color:#eceff1; font-family:'Courier New',monospace; padding:15px; }
#header { background:#111a24; padding:15px; border-radius:6px; border:1px solid #ff007f; margin-bottom:15px; }
button { background:#ff007f; color:#fff; border:none; padding:12px 24px; font-weight:bold; border-radius:4px; cursor:pointer; box-shadow: 0 0 10px rgba(255,0,127,0.4); }
.panel { background:#0f1620; border:1px solid #1f2c3d; border-radius:6px; padding:15px; margin-bottom:15px; }
.title { color:#ff007f; font-family:sans-serif; font-size:14px; font-weight:bold; text-transform:uppercase; margin-bottom:10px; }
.log-box { background:#03060a; padding:12px; border-radius:4px; font-size:12px; line-height:1.6; color:#00ffcc; max-height:400px; overflow-y:auto; }
.err { color:#ff1744; }
.succ { color:#00e676; }
</style>
</head>
<body>

<div id="header">
    <div style="margin-bottom:10px;">
        <strong style="color:#ff007f;">HARDWARE DEEP SCANNER v5.3</strong><br>
        <span id="status" style="font-size:12px; color:#b0bec5;">Připraveno k hloubkovému testu služeb</span>
    </div>
    <button id="conn-btn">PROSKENOVAT KOSTKU</button>
</div>

<div class="panel">
    <div class="title">📡 Výpis nalezených hardwarových registrů</div>
    <div class="log-box" id="scan-log">Zde se objeví kompletní výpis vnitřních služeb po připojení...</div>
</div>

<script>
const logBox = document.getElementById("scan-log");

function log(msg, type="") {
    let div = document.createElement("div");
    if(type === "err") div.className = "err";
    if(type === "succ") div.className = "succ";
    div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logBox.appendChild(div);
    logBox.scrollTop = logBox.scrollHeight;
}

document.getElementById("conn-btn").onclick = async () => {
    try {
        logBox.innerHTML = "";
        log("Spouštím hloubkový sken zařízení...");
        
        // Požádáme o zařízení a povolíme všechny dostupné služby v okolí
        const device = await navigator.bluetooth.requestDevice({
            filters: [{namePrefix:"MG"}, {namePrefix:"GAN"}],
            optionalServices: [
                "6e400001-b5a3-f393-e0a9-e50e24dc4179", // Pohybová služba
                "0000180f-0000-1000-8000-00805f9b34fb", // Standardní BLE Battery Service
                "0000180a-0000-1000-8000-00805f9b34fb"  // Standardní Device Information
            ]
        });

        log(`Nalezeno zařízení: ${device.name}`, "succ");
        const server = await device.gatt.connect();
        log("Spojení s GATT serverem úspěšné. Mapuji vnitřní služby...", "succ");

        // Pokus 1: Standardní bateriová služba BLE
        try {
            const batService = await server.getPrimaryService("0000180f-0000-1000-8000-00805f9b34fb");
            const batChar = await batService.getCharacteristic("00002a19-0000-1000-8000-00805f9b34fb");
            const batVal = await batChar.readValue();
            log(`🔋 KLASICKÁ BLE BATERIE DETEKOVÁNA: ${batVal.getUint8(0)}%`, "succ");
        } catch(e) {
            log("Kostka nevyužívá standardní samostatnou BLE Battery službu, jdu prohledat privátní registry...", "err");
        }

        // Pokus 2: Výpis charakteristik v hlavní privátní službě GAN
        try {
            const mainService = await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dc4179");
            log("Hlavní pohybová služba nalezena. Pokouším se vyčíst sekundární charakteristiky...");
            
            // Zkusíme přečíst data z druhé známé charakteristiky, která často slouží pro konfiguraci/baterii
            try {
                const configChar = await mainService.getCharacteristic("28be4cb7-cd67-11e9-a32f-2a2ae2dbcce4");
                const confVal = await configChar.readValue();
                let rawHex = [];
                for(let i=0; i<confVal.byteLength; i++) rawHex.push("0x" + confVal.getUint8(i).toString(16).toUpperCase());
                log(`📦 Konfigurační registr [4cb7] vrátil: ${rawHex.join(" ")}`, "succ");
            } catch(errChar) {
                log("Sekundární charakteristika [4cb7] neodpovídá na přímé čtení.", "err");
            }
            
        } catch(e) {
            log("Nepodařilo se mapovat vnitřní privátní charakteristiky.", "err");
        }

        log("Skenování dokončeno. Pokud se nahoře neobjevila zelená řádka s procenty, baterie je natvrdo zakódovaná přímo uvnitř startovacího balíčku tahů.");

    } catch (e) {
        log("Chyba skeneru: " + e.message, "err");
    }
};
</script>
</body>
</html>
