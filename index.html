<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MG3i RAW Analyzer v3.1</title>
<style>
body{
margin:0;
background:#090d10;
color:#e2e8f0;
font-family:'Courier New',monospace;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
min-height:100vh;
padding:20px;
box-sizing:border-box;
}
#version-tag {
font-family: sans-serif;
font-size: 14px;
font-weight: bold;
color: #00e676;
background: rgba(0,230,118,0.1);
padding: 4px 12px;
border-radius: 20px;
border: 1px solid #00e676;
margin-bottom: 15px;
}
button{
padding:15px 30px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:8px;
background:#00e5ff;
color:black;
margin-bottom:20px;
cursor:pointer;
font-family:sans-serif;
box-shadow: 0 4px 15px rgba(0,229,255,0.3);
}
#status{
color:#a0aec0;
font-size:14px;
margin-bottom:20px;
font-family:sans-serif;
}
.console{
background:#141b24;
border:2px solid #2d3748;
border-radius:10px;
padding:15px;
width:100%;
max-width:500px;
box-sizing:border-box;
}
.row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #1a202c;
font-size:14px;
}
.index{ color:#00e5ff; font-weight:bold; }
.hex{ color:#ffeb3b; font-weight:bold; }
.changed { background: rgba(255, 235, 59, 0.15); }
#packet-info {
font-size: 16px;
color: #ff9100;
margin-bottom: 10px;
font-family: sans-serif;
font-weight: bold;
}
</style>
</head>
<body>

<div id="version-tag">VERZE APLIKACE: v3.1 (20-BYTE MONITOR)</div>

<button id="btn">SLEDY 20-BAJTOVÝCH BLOKŮ</button>
<div id="status">Odpojeno</div>
<div id="packet-info">Velikost balíčku: Čekám...</div>

<div class="console" id="console-box">
    <div style="text-align:center;color:#4a5568;">Otoč stěnou U o 90° a podrž ji. Sleduj změny.</div>
</div>

<script>
const btn=document.getElementById("btn");
const status=document.getElementById("status");
const packetInfo=document.getElementById("packet-info");
const consoleBox=document.getElementById("console-box");

let previousRawBytes = [];

btn.onclick=async()=>{
    try{
        status.innerText="Vyhledávám Bluetooth zařízení...";
        const device=await navigator.bluetooth.requestDevice({
            filters:[{namePrefix:"MG"}, {namePrefix:"GAN"}],
            optionalServices:["6e400001-b5a3-f393-e0a9-e50e24dc4179"]
        });

        const server=await device.gatt.connect();
        const service=await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dc4179");
        const characteristic=await service.getCharacteristic("28be4cb6-cd67-11e9-a32f-2a2ae2dbcce4");

        await characteristic.startNotifications();

        btn.style.display="none";
        status.innerText="Připojen 20-bajtový stream z: " + device.name;

        characteristic.addEventListener("characteristicvaluechanged",event=>{
            const value=event.target.value;
            let len = value.byteLength;
            
            packetInfo.innerText = "Délka balíčku: " + len + " bajtů";

            let rawBytes = [];
            for (let i = 0; i < len; i++) {
                rawBytes.push(value.getUint8(i));
            }

            let html = "";
            for(let i=0; i<len; i++) {
                let currentByte = rawBytes[i];
                let hexVal = currentByte.toString(16).toUpperCase().padStart(2, '0');
                
                let changeClass = (previousRawBytes.length > i && currentByte !== previousRawBytes[i]) ? "changed" : "";

                html += `<div class="row ${changeClass}">`;
                html += `  <span class="index">RAW Bajt [${String(i).padStart(2, '0')}]</span>`;
                html += `  <span class="hex">HEX: 0x${hexVal} (DEC: ${currentByte})</span>`;
                html += `</div>`;
            }

            consoleBox.innerHTML = html;
            previousRawBytes = [...rawBytes];
        });

    }catch(e){
        status.innerText="Chyba: " + e.message;
    }
};
</script>
</body>
</html>
