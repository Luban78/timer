<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MG3i Hybrid Ultimate Trainer</title>
<style>
body{
margin:0;
background:#121212;
color:white;
font-family:Arial,sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
user-select:none;
}
#stop-zone{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
button{
padding:15px 30px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:50px;
background:#00e676;
color:black;
margin-bottom:15px;
z-index:10;
position:relative;
}
#status{
color:#aaa;
font-size:14px;
height:20px;
margin-bottom:5px;
z-index:5;
}
#state-msg{
font-size:22px;
font-weight:bold;
height:30px;
color:yellow;
}
#tps{
font-size:100px;
font-weight:bold;
color:#00e5ff;
line-height:1;
margin:10px;
}
.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
width:90%;
max-width:400px;
z-index:5;
}
.stat-box{
background:#1e1e1e;
padding:12px;
border-radius:12px;
text-align:center;
border:1px solid #333;
}
.stat-label{
font-size:12px;
color:#999;
}
.stat-val{
font-size:22px;
font-weight:bold;
}
canvas{
position:absolute;
bottom:0;
left:0;
width:100%;
height:30%;
pointer-events:none;
z-index:2;
}
#hint{
font-size:13px;
color:#555;
margin-top:10px;
text-align:center;
}
</style>
</head>
<body>

<div id="stop-zone">
    <button id="btn">PŘIPOJIT KOSTKU</button>
    <div id="status">Odpojeno</div>
    <div id="state-msg">Připoj kostku</div>
    <div id="tps">0.0</div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">ČAS</div>
            <div id="time-val" class="stat-val">0.00s</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">TAHY</div>
            <div id="moves-val" class="stat-val">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">PRŮMĚRNÉ TPS</div>
            <div id="avg-val" class="stat-val" style="color:#00e676">0.0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">MAX TPS</div>
            <div id="max-val" class="stat-val">0.0</div>
        </div>
        <div class="stat-box" style="grid-column:span 2">
            <div class="stat-label">NEJDELŠÍ PAUZA</div>
            <div id="pause-val" class="stat-val" style="color:#ff1744">0.00s</div>
        </div>
    </div>
    
    <div id="hint">Start otočením stěny | Stop klepnutím na displej</div>
</div>

<canvas id="graph"></canvas>

<script>
const btn=document.getElementById("btn");
const status=document.getElementById("status");
const state=document.getElementById("state-msg");
const tps=document.getElementById("tps");

const timeVal=document.getElementById("time-val");
const movesVal=document.getElementById("moves-val");
const avgVal=document.getElementById("avg-val");
const maxVal=document.getElementById("max-val");
const pauseVal=document.getElementById("pause-val");

const canvas=document.getElementById("graph");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight*.3;

let rawSignals=[];
let totalMoves=0;
let maxTPS=0;
let longestPause=0;
let lastSignalTime=0;

let solving=false;
let startTime=0;
let timer=null;
let readyToStart=false;
let graph=[];

btn.onclick=async(e)=>{
    e.stopPropagation();
    try{
        status.innerText="Vyber MG3i";
        const device=await navigator.bluetooth.requestDevice({
            filters:[{namePrefix:"MG"}, {namePrefix:"GAN"}],
            optionalServices:["6e400001-b5a3-f393-e0a9-e50e24dc4179"]
        });

        const server=await device.gatt.connect();
        const service=await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dc4179");
        const characteristic=await service.getCharacteristic("28be4cb6-cd67-11e9-a32f-2a2ae2dbcce4");

        await characteristic.startNotifications();

        btn.style.display="none";
        status.innerText="Připojeno: "+device.name;
        state.innerText="PŘIPRAVEN";
        readyToStart=true;

        characteristic.addEventListener("characteristicvaluechanged",()=>{
            const now = performance.now();
            
            if(readyToStart && !solving){
                startSolve(now);
            } else if(solving) {
                // Zaznamenáváme surové signály pro vykreslení plynulosti grafu
                if(now - lastSignalTime > 30) { 
                    rawSignals.push(now);
                    let pause = (now - lastSignalTime) / 1000;
                    if(pause > longestPause && lastSignalTime > 0) {
                        longestPause = pause;
                        pauseVal.innerText = longestPause.toFixed(2) + "s";
                    }
                    lastSignalTime = now;
                }
            }
        });

        setInterval(updateLiveGraph, 100);

    }catch(err){
        status.innerText=err.message;
    }
};

function startSolve(now){
    solving=true;
    readyToStart=false;
    startTime=now;
    lastSignalTime=now;
    totalMoves=0;
    maxTPS=0;
    longestPause=0;
    rawSignals=[now];
    graph=[];

    state.innerText="SKLÁDÁŠ";
    tps.innerText="0.0";

    timer=setInterval(()=>{
        let t=(performance.now()-startTime)/1000;
        timeVal.innerText=t.toFixed(2)+"s";
    },50);
}

// STOP ZÓNA: Klepnutí stopne čas a vyžádá si počet tahů pro přesné statistiky
stopZone.onclick=()=>{
    if(solving){
        solving=false;
        clearInterval(timer);
        
        const now = performance.now();
        let finalTime=(now-startTime)/1000;
        timeVal.innerText=finalTime.toFixed(2)+"s";
        
        state.innerText="PROCESUJI...";

        // Krátká pauza, aby vyskakovací okno nepřerušilo renderování displeje
        setTimeout(() => {
            let enteredMoves = prompt("Skvěle! Kolik tahů měl tvůj solve?", "55");
            
            if (enteredMoves === null || enteredMoves === "" || isNaN(enteredMoves)) {
                totalMoves = 50; // Výchozí hodnota, pokud uživatel nic nezadá
            } else {
                totalMoves = parseInt(enteredMoves);
            }

            movesVal.innerText = totalMoves;
            
            // Přesný dopočet průměrného TPS
            let finalAvg = totalMoves / finalTime;
            avgVal.innerText = finalAvg.toFixed(1);

            state.innerText="SOLVE DOKONČEN!";
            
            // Příprava na další pokus
            setTimeout(()=>{
                if(!solving){
                    state.innerText="PŘIPRAVEN";
                    readyToStart=true;
                }
            },2000);
        }, 100);
    }
};

function updateLiveGraph(){
    if(!solving) return;
    
    const now=performance.now();
    // Filtrujeme signály starší než 1 sekunda pro live TPS efekt
    rawSignals=rawSignals.filter(t=>now-t<1000);
    
    // Pro live zobrazení bereme očištěný poměr vysílaných dat
    let liveTPS = rawSignals.length / 3.5; 
    if(liveTPS < 0) liveTPS = 0;
    
    tps.innerText=liveTPS.toFixed(1);

    if(liveTPS > maxTPS){
        maxTPS=liveTPS;
        maxVal.innerText=maxTPS.toFixed(1);
    }

    graph.push(liveTPS);
    if(graph.length>100){
        graph.shift();
    }
    drawGraph();
}

function drawGraph(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(graph.length<2) return;

    ctx.beginPath();
    ctx.strokeStyle="#00e676";
    ctx.lineWidth=4;

    let step=canvas.width/100;

    for(let i=0;i<graph.length;i++){
        let x=i*step;
        let y=canvas.height-(graph[i]/12)*canvas.height;

        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }
    ctx.stroke();
}
</script>
</body>
</html>
