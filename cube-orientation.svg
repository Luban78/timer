<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" role="img" aria-label="Cube orientation preview">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#00e676" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="topY" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff06b"/>
      <stop offset="1" stop-color="#d9b900"/>
    </linearGradient>
    <linearGradient id="frontG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18ed6f"/>
      <stop offset="1" stop-color="#00963e"/>
    </linearGradient>
    <linearGradient id="rightR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4338"/>
      <stop offset="1" stop-color="#a70d0d"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2426"/>
      <stop offset="1" stop-color="#040707"/>
    </linearGradient>
  </defs>
  <ellipse cx="250" cy="365" rx="170" ry="35" fill="#001d14" opacity="0.5"/>
  <g filter="url(#shadow)" stroke="url(#edge)" stroke-width="9" stroke-linejoin="round">
    <!-- top face -->
    <polygon points="150,110 265,55 390,118 270,180" fill="url(#topY)"/>
    <!-- front face -->
    <polygon points="150,110 270,180 270,315 150,245" fill="url(#frontG)"/>
    <!-- right face -->
    <polygon points="270,180 390,118 390,250 270,315" fill="url(#rightR)"/>

    <!-- top grid -->
    <line x1="190" y1="91" x2="310" y2="153"/>
    <line x1="228" y1="73" x2="348" y2="135"/>
    <line x1="150" y1="110" x2="270" y2="180"/>
    <line x1="210" y1="83" x2="331" y2="145"/>
    <line x1="150" y1="110" x2="390" y2="118" opacity="0"/>
    <line x1="190" y1="133" x2="310" y2="73"/>
    <line x1="231" y1="157" x2="351" y2="97"/>

    <!-- front grid -->
    <line x1="190" y1="134" x2="190" y2="270"/>
    <line x1="230" y1="157" x2="230" y2="292"/>
    <line x1="150" y1="155" x2="270" y2="225"/>
    <line x1="150" y1="200" x2="270" y2="270"/>

    <!-- right grid -->
    <line x1="310" y1="159" x2="310" y2="293"/>
    <line x1="350" y1="139" x2="350" y2="271"/>
    <line x1="270" y1="225" x2="390" y2="162"/>
    <line x1="270" y1="270" x2="390" y2="206"/>
  </g>
</svg>
